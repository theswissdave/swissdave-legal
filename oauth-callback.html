<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>TikTok Auth Callback</title>
  <style>
      body { font-family: -apple-system, Helvetica, Arial, sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; line-height: 1.6; }
      #result { white-space: pre-wrap; background: #f5f5f5; padding: 20px; border-radius: 8px; word-break: break-all; }
      .token-hidden { filter: blur(6px); cursor: pointer; }
    </style>
  </head>
  <body>
    <h2>TikTok Authorization Result</h2>
  <p id="status">Processing...</p>p>
  <div id="result"></div>div>
  
  <script>
    (async () => {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');

        if (!code) {
              statusEl.textContent = 'No authorization code found in URL.';
              return;
        }

        try {
              const body = new URLSearchParams({
                      client_key: 'sbawlzi65gen4iuufy',
                      client_secret: '0JCI0dX7dlt711shQMDpu9BWarkNsW8I',
                      code: code,
                      grant_type: 'authorization_code',
                      redirect_uri: window.location.origin + window.location.pathname
              });
              const res = await fetch('https://open.tiktokapis.com/v2/oauth/token/', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                      body: body.toString()
              });
              const data = await res.json();
              statusEl.textContent = data.error ? ('Error: ' + data.error) : 'Success! Token received.';
              resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
              statusEl.textContent = 'Request failed.';
              resultEl.textContent = e.message;
        }
    })();
  </script>
  </body>
</html>html>

  </script></h2>
  </body>
  </style></title>
  </head>
